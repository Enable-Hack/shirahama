# ============================================================
# SCCS2026 / whiskey 班 用 SSH 設定テンプレ
# ============================================================
# このファイルは ~/.ssh/config に追記する内容のテンプレート。
# プロジェクトに含めることで全員が同じ設定にできる。
#
# 使い方（5/5 競技開始前 / 1 回だけ）:
#   1. VPN を接続済みであることを確認
#   2. cat templates/ssh_config_sccs2026.conf >> ~/.ssh/config
#   3. chmod 600 ~/.ssh/config
#   4. ssh bravo  ← 初回はパスワード入力。以降 8h 自動再利用
#   5. ssh victor ← 同上
#
# 設計方針:
#   - サーバ側（authorized_keys）には一切手を加えない
#   - ControlMaster + ControlPersist で接続を 8 時間維持し、
#     2 回目以降のコマンドはパスワード不要
#   - Mac の操作端末 (operator Mac) のみで完結、サーバには痕跡を残さない
#   - PDF「上記項目は変更しない」「ログは消さない・改ざんしない」遵守
#
# パスワード（紙資料 docs/16_本番環境クイックリファレンス §1.2 参照）:
#   ssh manage パス: sh1Ra8mA
#   ssh root   パス: KCom10sT  ← bravo の sudo 不可問題対応で必要
# ============================================================

# ─── ControlMaster 用ソケット置き場 ───────────────────
# 事前に mkdir -p ~/.ssh/cm して下さい
# パスは Mac の SHA-1 で 100 文字超えないよう短めに

# ─── bravo (FreeBSD / DNS / Mail / WWW user hosting) ──
Host bravo
    HostName 10.1.1.1
    User manage
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h
    ServerAliveInterval 60
    ServerAliveCountMax 3

Host bravo-root
    HostName 10.1.1.1
    User root
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h
    ServerAliveInterval 60
    ServerAliveCountMax 3

# ─── victor (Rocky Linux / Web Company / DHCP / MRTG) ──
Host victor
    HostName 10.1.1.2
    User manage
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h
    ServerAliveInterval 60
    ServerAliveCountMax 3

Host victor-root
    HostName 10.1.1.2
    User root
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h
    ServerAliveInterval 60
    ServerAliveCountMax 3

# ─── 補助: IP 直叩きでも ControlMaster を効かせる ──────
# /incident や Claude Code が 'ssh manage@10.1.1.2 ...' と
# 直接 IP を叩いてきても、上の bravo/victor 接続を再利用させる
Host 10.1.1.1
    User manage
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h

Host 10.1.1.2
    User manage
    ControlMaster auto
    ControlPath ~/.ssh/cm/%r@%h:%p
    ControlPersist 8h

# ─── 共通の安全設定 (本番でも個人用 SSH でも有害でない) ─
# 古い暗号方式を拒否（最新の Mac/Linux には影響なし）
Host bravo* victor* 10.1.1.*
    KexAlgorithms +diffie-hellman-group14-sha1
    HostKeyAlgorithms +ssh-rsa,ssh-dss
    PubkeyAcceptedAlgorithms +ssh-rsa
    # ↑ 古い BIND/OpenSSH 互換性のため (FreeBSD 14 / Rocky 8 のデフォルト次第)
