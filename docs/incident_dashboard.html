<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>白浜 incident dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0e1117;
    --bg-panel: #161b22;
    --bg-panel-2: #1f2733;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --red: #f85149;
    --yellow: #d29922;
    --green: #3fb950;
    --gray: #6e7681;
    --in-scope-bg: #1a2f1f;
    --in-scope-border: #3fb950;
    --out-scope-bg: #2c2419;
    --out-scope-border: #d29922;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 10px 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  header .meta {
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  header .refresh-toggle {
    cursor: pointer;
    user-select: none;
    padding: 4px 8px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
  }
  header .refresh-toggle.on { color: var(--green); border-color: var(--green); }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    overflow: hidden;
  }
  #pane-list {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px;
  }
  #pane-list .empty {
    padding: 20px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
  }
  .incident-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.1s;
  }
  .incident-card:hover { border-color: var(--accent); }
  .incident-card.active {
    border-color: var(--accent);
    background: #1c2733;
  }
  .incident-card .id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
  }
  .incident-card .meta {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .verdict-badge {
    font-size: 12px;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .verdict-🚨, .verdict-warn-high { color: var(--red); }
  .verdict-⚠️, .verdict-warn { color: var(--yellow); }
  .verdict-✅, .verdict-ok { color: var(--green); }
  .verdict-info, .verdict-default { color: var(--text-dim); }
  #pane-detail {
    overflow-y: auto;
    padding: 20px 24px;
  }
  #pane-detail .placeholder {
    color: var(--text-dim);
    text-align: center;
    margin-top: 80px;
    font-size: 14px;
  }
  #pane-detail h2 {
    margin: 0 0 4px;
    font-size: 18px;
    font-family: var(--mono);
    word-break: break-all;
  }
  #pane-detail .header-meta {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
  }
  #pane-detail .header-meta button {
    background: var(--bg-panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  #pane-detail .header-meta button:hover { border-color: var(--accent); }
  .section {
    margin: 18px 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .section h3 {
    margin: 0 0 10px;
    font-size: 14px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section h3 .badge {
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-panel-2);
    border-radius: 3px;
    color: var(--text-dim);
    font-weight: normal;
  }
  .skill-entry {
    margin: 8px 0;
    padding: 8px 10px;
    background: var(--bg-panel-2);
    border-left: 3px solid var(--gray);
    border-radius: 0 4px 4px 0;
    font-size: 13px;
  }
  .skill-entry.verdict-🚨 { border-left-color: var(--red); }
  .skill-entry.verdict-⚠️ { border-left-color: var(--yellow); }
  .skill-entry.verdict-✅ { border-left-color: var(--green); }
  .skill-entry .summary { color: var(--text); }
  .skill-entry .ts { color: var(--text-dim); font-size: 11px; font-family: var(--mono); }
  .scope-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .scope-box {
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .scope-box.in-scope {
    background: var(--in-scope-bg);
    border-color: var(--in-scope-border);
  }
  .scope-box.out-scope {
    background: var(--out-scope-bg);
    border-color: var(--out-scope-border);
  }
  .scope-box h4 {
    margin: 0 0 6px;
    font-size: 12px;
    color: var(--text);
  }
  .scope-box ul {
    margin: 0;
    padding-left: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .scope-box li { margin: 2px 0; }
  table.compare {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 6px;
  }
  table.compare th, table.compare td {
    padding: 5px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  table.compare th {
    background: var(--bg-panel-2);
    color: var(--text-dim);
    font-weight: normal;
    font-size: 11px;
  }
  table.compare td.verdict {
    font-family: var(--mono);
    white-space: nowrap;
    font-size: 12px;
  }
  table.compare td.verdict.match { color: var(--green); }
  table.compare td.verdict.partial { color: var(--yellow); }
  table.compare td.verdict.mismatch, table.compare td.verdict.blindspot { color: var(--red); font-weight: 600; }
  table.compare td.verdict.unknown { color: var(--text-dim); }
  .judgment-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
    font-size: 13px;
  }
  .judgment-row .primary {
    font-size: 18px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
    background: var(--bg-panel-2);
  }
  .judgment-row .primary.D { color: var(--red); background: #2c1819; }
  .judgment-row .primary.C { color: var(--yellow); background: #2c2419; }
  .judgment-row .primary.B { color: var(--accent); background: #16252e; }
  .judgment-row .primary.A { color: var(--green); background: #1a2f1f; }
  .judgment-row .confidence { color: var(--text-dim); font-family: var(--mono); }
  .rationale, .alt-block {
    color: var(--text);
    font-size: 12px;
    margin-top: 6px;
  }
  .alt-block { color: var(--text-dim); margin-top: 4px; }
  .raw-toggle {
    margin-top: 10px;
    cursor: pointer;
    color: var(--accent);
    font-size: 11px;
    user-select: none;
  }
  pre.raw {
    display: none;
    margin-top: 6px;
    padding: 10px;
    background: #0a0d12;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
  }
  pre.raw.open { display: block; }
  .next-skills {
    margin-top: 6px;
    font-size: 12px;
  }
  .next-skills .pill {
    display: inline-block;
    padding: 2px 8px;
    margin: 2px 4px 2px 0;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }
  .empty-section { color: var(--text-dim); font-style: italic; font-size: 12px; }
  .error-banner {
    margin: 18px 0;
    padding: 10px 14px;
    background: #2c1819;
    border: 1px solid var(--red);
    border-radius: 6px;
    color: var(--red);
    font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>白浜 incident dashboard</h1>
  <div class="meta">
    <span id="now"></span>
    <span id="last-scan">scan: -</span>
    <span class="refresh-toggle on" id="refresh-toggle" onclick="toggleAutoRefresh()">auto-refresh: 5s</span>
  </div>
</header>
<main>
  <aside id="pane-list"><div class="empty">Loading...</div></aside>
  <section id="pane-detail"><div class="placeholder">← incident を選択してください</div></section>
</main>

<script>
const DATA_BASE = "../data/incidents/";
const REFRESH_INTERVAL_MS = 5000;
let autoRefreshOn = true;
let refreshTimer = null;
let activeId = null;
let knownIds = new Set();
let incidentCache = {};

function setNow() {
  document.getElementById("now").textContent = new Date().toLocaleString("ja-JP");
}
setInterval(setNow, 1000);
setNow();

function toggleAutoRefresh() {
  autoRefreshOn = !autoRefreshOn;
  const el = document.getElementById("refresh-toggle");
  el.classList.toggle("on", autoRefreshOn);
  el.textContent = autoRefreshOn ? "auto-refresh: 5s" : "auto-refresh: off";
  if (autoRefreshOn) startTimer(); else clearInterval(refreshTimer);
}

function startTimer() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => scanIncidents(false), REFRESH_INTERVAL_MS);
}

// ---- Discover incident dirs by parsing http.server autoindex ----
async function listDir(url) {
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return [];
    const text = await res.text();
    // python http.server autoindex: <a href="name/">name/</a> for dirs, <a href="name.json">name.json</a> for files
    const matches = [...text.matchAll(/<a href="([^"]+)"/g)];
    return matches
      .map(m => decodeURIComponent(m[1]))
      .filter(n => n && n !== "../" && n !== "./" && !n.startsWith("?") && !n.startsWith("/"));
  } catch (e) {
    return [];
  }
}

async function scanIncidents(showLoading) {
  if (showLoading) {
    document.getElementById("pane-list").innerHTML = '<div class="empty">Loading...</div>';
  }
  const entries = await listDir(DATA_BASE);
  const dirs = entries.filter(n => n.endsWith("/")).map(n => n.slice(0, -1));
  document.getElementById("last-scan").textContent = "scan: " + new Date().toLocaleTimeString("ja-JP");

  if (dirs.length === 0) {
    document.getElementById("pane-list").innerHTML =
      '<div class="empty">incidents 0 件<br><br>data/incidents/&lt;id&gt;/ ディレクトリが見つかりません。<br><br>このダッシュボードは<br>python3 -m http.server<br>でリポジトリルートから配信してください。</div>';
    return;
  }

  // sort newest first (lexicographic on YYYY-MM-DD_HH:MM works)
  dirs.sort().reverse();
  const newDirs = dirs.filter(d => !knownIds.has(d));

  for (const id of dirs) {
    const files = await listDir(DATA_BASE + encodeURIComponent(id) + "/");
    const jsonFiles = files.filter(f => f.endsWith(".json"));
    const skills = await Promise.all(jsonFiles.map(async f => {
      try {
        const r = await fetch(DATA_BASE + encodeURIComponent(id) + "/" + encodeURIComponent(f), { cache: "no-store" });
        if (!r.ok) return null;
        const j = await r.json();
        return { file: f, json: j };
      } catch (e) {
        return { file: f, json: null, error: String(e) };
      }
    }));
    incidentCache[id] = { id, skills: skills.filter(Boolean) };
  }

  knownIds = new Set(dirs);
  renderList(dirs);
  if (activeId && incidentCache[activeId]) {
    renderDetail(activeId);
  }
}

function severityRank(v) {
  if (v === "🚨") return 3;
  if (v === "⚠️") return 2;
  if (v === "✅") return 1;
  return 0;
}

function aggregateVerdict(incident) {
  let max = "info";
  for (const s of incident.skills) {
    const v = s.json?.verdict?.status || "info";
    if (severityRank(v) > severityRank(max)) max = v;
  }
  return max;
}

function renderList(dirs) {
  const pane = document.getElementById("pane-list");
  if (dirs.length === 0) return;
  pane.innerHTML = "";
  for (const id of dirs) {
    const inc = incidentCache[id];
    const verdict = inc ? aggregateVerdict(inc) : "info";
    const card = document.createElement("div");
    card.className = "incident-card" + (id === activeId ? " active" : "");
    card.onclick = () => selectIncident(id);
    const skillCount = inc ? inc.skills.length : 0;
    card.innerHTML = `
      <div class="id">${escapeHtml(id)}</div>
      <div class="meta">
        <span>${skillCount} skills</span>
        <span class="verdict-badge verdict-${verdict}">${verdict}</span>
      </div>
    `;
    pane.appendChild(card);
  }
}

function selectIncident(id) {
  activeId = id;
  document.querySelectorAll(".incident-card").forEach(c => c.classList.remove("active"));
  for (const c of document.querySelectorAll(".incident-card")) {
    if (c.querySelector(".id").textContent === id) c.classList.add("active");
  }
  renderDetail(id);
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function bySkill(incident, name) {
  return incident.skills.filter(s => s.json?.skill === name);
}

function fmtTs(s) {
  if (!s) return "-";
  return s.replace("T", " ").replace(/\.\d+Z?$/, "").replace("Z", " UTC");
}

function renderDetail(id) {
  const inc = incidentCache[id];
  const pane = document.getElementById("pane-detail");
  if (!inc) {
    pane.innerHTML = '<div class="placeholder">data fetching...</div>';
    return;
  }

  const incidentJsons = bySkill(inc, "incident");
  const reviewJsons = bySkill(inc, "review");
  const reviewHumanJsons = inc.skills.filter(s => s.file.startsWith("review_human__"));
  const reportJsons = bySkill(inc, "report");
  const checkJsons = inc.skills.filter(s => s.json?.skill?.startsWith?.("check"));
  const playbookJsons = inc.skills.filter(s => s.json?.skill?.startsWith?.("playbook"));
  const otherJsons = inc.skills.filter(s => {
    const sk = s.json?.skill || "";
    return !["incident", "review", "report"].includes(sk) && !sk.startsWith("check") && !sk.startsWith("playbook") && !s.file.startsWith("review_human__");
  });

  const html = [];
  html.push(`<h2>${escapeHtml(id)}</h2>`);
  html.push(`<div class="header-meta">
    <span>${inc.skills.length} JSON files</span>
    <button onclick="window.open('file://${escapeHtml(window.location.pathname.replace('/docs/incident_dashboard.html', '/data/incidents/' + id + '/'))}')">open dir</button>
    <button onclick="navigator.clipboard.writeText(${JSON.stringify(JSON.stringify(inc, null, 2))})">copy raw JSON</button>
  </div>`);

  html.push(renderIncidentSection(incidentJsons));
  html.push(renderReviewSection(reviewJsons, reviewHumanJsons));
  html.push(renderChecksSection(checkJsons));
  html.push(renderPlaybookSection(playbookJsons));
  html.push(renderReportSection(reportJsons));
  if (otherJsons.length > 0) html.push(renderOtherSection(otherJsons));

  pane.innerHTML = html.join("");

  pane.querySelectorAll(".raw-toggle").forEach(t => {
    t.onclick = () => t.nextElementSibling.classList.toggle("open");
  });
}

function renderIncidentSection(items) {
  if (items.length === 0) {
    return `<div class="section"><h3>📞 受電 / トリアージ (incident) <span class="badge">0</span></h3><div class="empty-section">/incident 未実行 (incident__*.json なし)</div></div>`;
  }
  const html = [`<div class="section"><h3>📞 受電 / トリアージ (incident) <span class="badge">${items.length}</span></h3>`];
  for (const s of items) {
    const j = s.json;
    const v = j.verdict || {};
    html.push(`<div class="skill-entry verdict-${v.status || 'info'}">
      <div class="summary"><b>${escapeHtml(v.status || '')}</b> ${escapeHtml(v.summary || '(no summary)')}</div>
      <div class="ts">${fmtTs(j.timestamp)} · window=${escapeHtml(j.inputs?.window || '?')} · host=${escapeHtml(j.inputs?.host || '?')}</div>
      ${renderNextSkills(j.next_skills)}
      <div class="raw-toggle">▶ raw JSON (${escapeHtml(s.file)})</div>
      <pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>
    </div>`);
  }
  html.push("</div>");
  return html.join("");
}

function renderReviewSection(items, humanItems) {
  const html = [`<div class="section"><h3>🔍 突合 / 判定推奨 (review) <span class="badge">${items.length} ai · ${humanItems.length} human</span></h3>`];
  if (items.length === 0) {
    html.push(`<div class="empty-section">/review 未実行 (review__*.json なし)</div>`);
  }
  for (const s of items) {
    const j = s.json;
    const out = j.outputs || {};
    const judgment = out.judgment_recommendation || {};
    const scope = out.scope_proposal || {};
    const comparison = out.comparison || [];

    html.push(`<div class="skill-entry verdict-${j.verdict?.status || 'info'}">`);

    // Comparison table
    if (comparison.length > 0) {
      html.push(`<div style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">突合表 (${comparison.length} 件)</div>`);
      html.push(`<table class="compare"><tr><th>観点</th><th>顧客発言</th><th>ログ実態</th><th>突合</th></tr>`);
      for (const r of comparison) {
        const v = r.verdict || "unknown";
        const vClass = v === "match" ? "match" : v === "partial" ? "partial" : v === "mismatch" ? "mismatch" : v === "blindspot" ? "blindspot" : "unknown";
        const vIcon = v === "match" ? "✅" : v === "partial" ? "⚠️" : v === "mismatch" ? "🚨 不一致" : v === "blindspot" ? "🚨 顧客盲点" : "❓";
        html.push(`<tr>
          <td>${escapeHtml(r.axis || '')}</td>
          <td>${escapeHtml(r.customer || '')}</td>
          <td>${escapeHtml(r.log || '')}</td>
          <td class="verdict ${vClass}">${vIcon}</td>
        </tr>`);
      }
      html.push(`</table>`);
    }

    // Judgment recommendation
    if (judgment.primary) {
      html.push(`<div style="font-size:12px;color:var(--text-dim);margin-top:10px;">判定推奨 (auto-pick せず、人間がラジオ選択)</div>`);
      html.push(`<div class="judgment-row">
        <span class="primary ${judgment.primary}">${escapeHtml(judgment.primary)}</span>
        <span class="confidence">conf=${judgment.confidence ?? '?'}</span>
      </div>`);
      if (judgment.rationale) html.push(`<div class="rationale">理由: ${escapeHtml(judgment.rationale)}</div>`);
      if (judgment.alternative) html.push(`<div class="alt-block">代替案: <b>${escapeHtml(judgment.alternative)}</b> ${judgment.alt_condition ? '(' + escapeHtml(judgment.alt_condition) + ')' : ''}</div>`);
    }

    // Scope proposal
    if (scope.in_scope || scope.out_of_scope_logged) {
      html.push(`<div style="font-size:12px;color:var(--text-dim);margin-top:10px;">「治しすぎない」スコープ提案</div>`);
      html.push(`<div class="scope-grid">`);
      html.push(`<div class="scope-box in-scope"><h4>✅ 今回 (受電と関係) 塞ぐ</h4><ul>`);
      for (const it of (scope.in_scope || [])) html.push(`<li>${escapeHtml(it)}</li>`);
      if (!(scope.in_scope || []).length) html.push(`<li style="font-style:italic;">(なし)</li>`);
      html.push(`</ul></div>`);
      html.push(`<div class="scope-box out-scope"><h4>📝 発見したが今回は塞がない (記録のみ)</h4><ul>`);
      for (const it of (scope.out_of_scope_logged || [])) html.push(`<li>${escapeHtml(it)}</li>`);
      if (!(scope.out_of_scope_logged || []).length) html.push(`<li style="font-style:italic;">(なし)</li>`);
      html.push(`</ul></div>`);
      html.push(`</div>`);
    }

    html.push(`<div class="ts" style="margin-top:8px;">${fmtTs(j.timestamp)} · ${escapeHtml(s.file)}</div>`);
    html.push(renderNextSkills(j.next_skills));
    html.push(`<div class="raw-toggle">▶ raw JSON</div><pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>`);
    html.push(`</div>`);
  }

  // Human採択結果
  if (humanItems.length > 0) {
    html.push(`<div style="margin-top:14px;font-size:12px;color:var(--text-dim);">採択判定 (人間)</div>`);
    for (const s of humanItems) {
      const j = s.json || {};
      html.push(`<div class="skill-entry">
        <div class="summary"><b>採択: ${escapeHtml(j.adopted || '?')}</b> by ${escapeHtml(j.adopted_by || '?')}</div>
        <div class="ts">${fmtTs(j.timestamp)} · ${escapeHtml(s.file)}</div>
        ${j.note ? `<div class="rationale">メモ: ${escapeHtml(j.note)}</div>` : ''}
      </div>`);
    }
  }

  html.push(`</div>`);
  return html.join("");
}

function renderChecksSection(items) {
  if (items.length === 0) {
    return `<div class="section"><h3>🔬 個別確認 (check) <span class="badge">0</span></h3><div class="empty-section">/check 未実行</div></div>`;
  }
  const html = [`<div class="section"><h3>🔬 個別確認 (check) <span class="badge">${items.length}</span></h3>`];
  for (const s of items) {
    const j = s.json;
    const v = j.verdict || {};
    html.push(`<div class="skill-entry verdict-${v.status || 'info'}">
      <div class="summary"><b>${escapeHtml(v.status || '')} ${escapeHtml(j.skill)}</b> — ${escapeHtml(v.summary || '(no summary)')}</div>
      <div class="ts">${fmtTs(j.timestamp)}</div>
      <div class="raw-toggle">▶ raw JSON</div><pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>
    </div>`);
  }
  html.push(`</div>`);
  return html.join("");
}

function renderPlaybookSection(items) {
  if (items.length === 0) {
    return `<div class="section"><h3>🛠 提案コマンド (playbook) <span class="badge">0</span></h3><div class="empty-section">/playbook:* 未実行 (or JSON 未対応)</div></div>`;
  }
  const html = [`<div class="section"><h3>🛠 提案コマンド (playbook) <span class="badge">${items.length}</span></h3>`];
  for (const s of items) {
    const j = s.json;
    const v = j.verdict || {};
    const validatorExit = j.outputs?.cmd_validator_exit;
    const validatorBadge = validatorExit === 0 ? '<span style="color:var(--green);">validator: ✅ PASS</span>'
                         : validatorExit === 1 ? '<span style="color:var(--red);">validator: 🚨 ERROR</span>'
                         : '<span style="color:var(--text-dim);">validator: -</span>';
    html.push(`<div class="skill-entry verdict-${v.status || 'info'}">
      <div class="summary"><b>${escapeHtml(j.skill)}</b> ${validatorBadge}</div>
      <div class="rationale">${escapeHtml(v.summary || '')}</div>
      <div class="ts">${fmtTs(j.timestamp)}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--yellow);">⚠️ 提案コマンドの実行は人間のみ (settings.production.json で deny 済)</div>
      <div class="raw-toggle">▶ raw JSON</div><pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>
    </div>`);
  }
  html.push(`</div>`);
  return html.join("");
}

function renderReportSection(items) {
  if (items.length === 0) {
    return `<div class="section"><h3>📤 完了報告 (report) <span class="badge">0</span></h3><div class="empty-section">/report 未実行</div></div>`;
  }
  const html = [`<div class="section"><h3>📤 完了報告 (report) <span class="badge">${items.length}</span></h3>`];
  for (const s of items) {
    const j = s.json;
    const out = j.outputs || {};
    const mode = out.completion_mode || 'unknown';
    const remaining = out.remaining_items || [];
    html.push(`<div class="skill-entry verdict-${j.verdict?.status || 'info'}">
      <div class="summary"><b>${mode === 'complete' ? '✅ 完全完了' : mode === 'first_response_only' ? '⚠️ 一次対応完了' : '? ' + escapeHtml(mode)}</b></div>
      ${remaining.length > 0 ? `<div class="rationale">残作業: ${remaining.map(r => escapeHtml(r)).join(', ')}</div>` : ''}
      <div class="ts">${fmtTs(j.timestamp)}</div>
      <div class="raw-toggle">▶ raw JSON</div><pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>
    </div>`);
  }
  html.push(`</div>`);
  return html.join("");
}

function renderOtherSection(items) {
  const html = [`<div class="section"><h3>📦 その他 skills <span class="badge">${items.length}</span></h3>`];
  for (const s of items) {
    const j = s.json || {};
    const v = j.verdict || {};
    html.push(`<div class="skill-entry verdict-${v.status || 'info'}">
      <div class="summary"><b>${escapeHtml(j.skill || s.file)}</b> ${escapeHtml(v.summary || '')}</div>
      <div class="ts">${fmtTs(j.timestamp)}</div>
      <div class="raw-toggle">▶ raw JSON</div><pre class="raw">${escapeHtml(JSON.stringify(j, null, 2))}</pre>
    </div>`);
  }
  html.push(`</div>`);
  return html.join("");
}

function renderNextSkills(arr) {
  if (!arr || arr.length === 0) return "";
  return `<div class="next-skills">→ next: ${arr.map(n => `<span class="pill">${escapeHtml(n)}</span>`).join("")}</div>`;
}

// ---- bootstrap ----
scanIncidents(true);
startTimer();
</script>
</body>
</html>
